name: Deploy to GitHub Pages

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build (ignore lint warnings)
        run: CI=false npm run build

      - name: Scan production bundles for eval/new Function
        run: |
          echo "===== SCAN: eval( ====="
          grep -R --line-number --binary-files=without-match "eval(" build/static/js || true
          echo "===== SCAN: new Function ====="
          grep -R --line-number --binary-files=without-match "new Function" build/static/js || true
          echo "===== SCAN DONE ====="

      # 🔥 THIS IS THE FIX
      - name: Inject runtime config into Pages root
        run: |
          cp public/config.json build/config.json
          touch build/.nojekyll
          echo "CONFIG DEPLOYED:"
          ls -la build | grep config.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Find eval/new Function in production bundles
        run: |
          echo "---- Searching build output for eval/new Function ----"
          grep -R --line-number --binary-files=without-match "eval(" build/static/js || true
          grep -R --line-number --binary-files=without-match "new Function" build/static/js || true
          echo "---- Done ----"
