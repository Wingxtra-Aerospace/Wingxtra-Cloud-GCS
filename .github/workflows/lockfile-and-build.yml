name: Bootstrap lockfile and build

on:
  workflow_dispatch:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies (bootstrap lockfile if missing)
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            echo "package-lock.json exists -> using npm ci"
            npm ci
          else
            echo "package-lock.json missing -> running npm install to generate it"
            npm install
            echo "Committing generated package-lock.json"
            git add package-lock.json
            git commit -m "CI: add package-lock.json" || echo "Nothing to commit"
            git push
          fi

      - name: Build
        run: npm run build
